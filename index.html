<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paws & Paths</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="screen active" id="mapScreen" data-screen="map" aria-label="Map">
        <div class="mock-map">
          <div id="realMap" class="real-map" aria-label="Interactive route map"></div>
        </div>

        <div class="map-search glass" id="mapSearchBar" role="search">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input id="mapSearchInput" type="search" placeholder="Search parks, routes, postcodes" autocomplete="off" />
          <button type="button" data-action="search-location" aria-label="Search"><i class="fa-solid fa-arrow-right"></i></button>
        </div>

        <div class="search-results glass" id="searchResults" hidden></div>

        <div class="map-controls">
          <button class="round-control" data-action="locate-user" aria-label="Locate me"><i class="fa-solid fa-location-crosshairs"></i></button>
          <button class="round-control" data-action="set-home" aria-label="Set home base"><i class="fa-solid fa-house"></i></button>
          <button class="round-control" data-action="focus-route" aria-label="Focus route"><i class="fa-solid fa-route"></i></button>
        </div>

        <article class="walk-card glass">
          <div class="walk-icon"><i class="fa-solid fa-dog"></i></div>
          <div>
            <p class="eyebrow">Ready for Walkies?</p>
            <h1 id="activeRouteName">Build your first route</h1>
            <p id="activeRouteMeta">Search a place or choose a route</p>
          </div>
          <button class="primary-action" data-action="start-active-route"><i class="fa-solid fa-person-walking"></i> Start Route</button>
        </article>
      </section>

      <section class="screen content-screen" id="routesScreen" data-screen="routes" aria-label="Routes"></section>
      <section class="screen content-screen" id="dogsScreen" data-screen="dogs" aria-label="Dogs"></section>
      <section class="screen content-screen" id="accountScreen" data-screen="account" aria-label="Account"></section>

      <nav class="tab-bar glass" aria-label="Main tabs">
        <button class="tab active" data-tab="map" type="button" aria-label="Map" title="Map">
          <i class="fa-solid fa-map-location-dot"></i>
        </button>
        <button class="tab" data-tab="routes" type="button" aria-label="Routes" title="Routes">
          <i class="fa-solid fa-route"></i>
        </button>
        <button class="tab" data-tab="dogs" type="button" aria-label="Dogs" title="Dogs">
          <i class="fa-solid fa-dog"></i>
        </button>
        <button class="tab" data-tab="account" type="button" aria-label="Account" title="Account">
          <i class="fa-solid fa-circle-user"></i>
        </button>
      </nav>
    </main>

    <div class="modal-layer" id="modalLayer" hidden></div>
    <div class="toast" id="toast" hidden>Design mockup only.</div>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
