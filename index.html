<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paws & Paths</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="screen active" id="mapScreen" data-screen="map" aria-label="Map">
        <div class="mock-map">
          <div id="realMap" class="real-map" aria-label="Interactive route map"></div>
          <div class="park park-one">Oak Meadow</div>
          <div class="park park-two">North Field</div>
          <div class="water"></div>
          <div class="road road-main"></div>
          <div class="road road-second"></div>
          <div class="road road-third"></div>
          <svg class="route-layer decorative-routes" viewBox="0 0 390 844" preserveAspectRatio="none" aria-hidden="true">
            <path class="route route-evening" d="M72 585 C118 515, 128 458, 184 423 S290 364, 314 290" />
            <path class="route route-morning" d="M88 334 C128 304, 156 270, 205 260 S286 253, 324 216" />
            <path class="route route-complete" d="M72 585 C118 515, 128 458, 184 423" />
          </svg>
          <div class="map-label label-route-one">Evening Park Loop</div>
          <div class="map-label label-route-two">Morning Sniff Route</div>
        </div>

        <header class="map-search glass">
          <i class="fa-solid fa-magnifying-glass"></i>
          <span id="mapSearchLabel">Search parks, routes, postcodes</span>
        </header>

        <div class="map-controls">
          <button class="round-control" data-action="locate-user" aria-label="Locate me"><i class="fa-solid fa-location-crosshairs"></i></button>
          <button class="round-control" data-action="set-home" aria-label="Set home base"><i class="fa-solid fa-house"></i></button>
          <button class="round-control" data-action="focus-route" aria-label="Focus route"><i class="fa-solid fa-route"></i></button>
        </div>

        <aside class="route-builder glass" id="routeBuilder" hidden>
          <div>
            <p class="eyebrow">Route Builder</p>
            <h2 id="builderTitle">Tap the map</h2>
            <p id="builderHint">Add at least two checkpoints to save a route.</p>
          </div>
          <div class="builder-actions">
            <button class="secondary-action" data-action="undo-checkpoint"><i class="fa-solid fa-rotate-left"></i>Undo</button>
            <button class="primary-action" data-action="save-built-route"><i class="fa-solid fa-check"></i>Save</button>
            <button class="ghost-action" data-action="cancel-route-builder">Cancel</button>
          </div>
        </aside>

        <article class="walk-card glass">
          <div class="walk-icon"><i class="fa-solid fa-dog"></i></div>
          <div>
            <p class="eyebrow">Ready for Walkies?</p>
            <h1 id="activeRouteName">Evening Park Loop</h1>
            <p id="activeRouteMeta">2.4 km &middot; 5 checkpoints &middot; Milo selected</p>
          </div>
          <button class="primary-action" data-action="start-route-builder"><i class="fa-solid fa-route"></i> Build Route</button>
        </article>
      </section>

      <section class="screen content-screen" id="routesScreen" data-screen="routes" aria-label="Routes"></section>
      <section class="screen content-screen" id="dogsScreen" data-screen="dogs" aria-label="Dogs"></section>
      <section class="screen content-screen" id="accountScreen" data-screen="account" aria-label="Account"></section>

      <nav class="tab-bar glass" aria-label="Main tabs">
        <button class="tab active" data-tab="map" type="button" aria-label="Map" title="Map">
          <i class="fa-solid fa-map-location-dot"></i>
        </button>
        <button class="tab" data-tab="routes" type="button" aria-label="Routes" title="Routes">
          <i class="fa-solid fa-route"></i>
        </button>
        <button class="tab" data-tab="dogs" type="button" aria-label="Dogs" title="Dogs">
          <i class="fa-solid fa-dog"></i>
        </button>
        <button class="tab" data-tab="account" type="button" aria-label="Account" title="Account">
          <i class="fa-solid fa-circle-user"></i>
        </button>
      </nav>
    </main>

    <div class="modal-layer" id="modalLayer" hidden></div>
    <div class="toast" id="toast" hidden>Design mockup only.</div>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
